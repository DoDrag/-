name: Daily Crawl

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST 실행
    - cron: '0 0 * * *'
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행 가능

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run crawler + generate report
        run: python research_crawler.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/ data/ db/
          if git diff --staged --quiet; then
            echo "변경사항 없음"
            exit 0
          fi
          git commit -m "daily update: $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          # 푸시 충돌 시 재시도 (레이스 컨디션 대응)
          for i in 1 2 3; do
            if git push; then
              echo "푸시 성공 (시도 $i)"
              exit 0
            fi
            echo "푸시 충돌, pull --rebase 후 재시도 ($i/3)"
            git pull --rebase origin main
            sleep 2
          done
          echo "3회 재시도 실패"
          exit 1

  deploy-pages:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
